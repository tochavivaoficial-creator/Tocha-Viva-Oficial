<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tocha Viva Oficial</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #121212; color: white; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; padding: 40px; background: #1a1a1a; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { margin-bottom: 5px; color: #ff4500; }
        p { color: #aaa; margin-bottom: 30px; }
        .btn { display: block; width: 100%; padding: 15px; margin: 15px 0; background: #222; color: #fff; text-decoration: none; border-radius: 50px; font-weight: bold; border: 1px solid #444; transition: 0.3s; }
        .btn:hover { background: #ff4500; border-color: #ff4500; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>Tocha Viva</h1>
    <p>Compositora e Produtora | Studio Deus Extraordinário</p>

    <!-- Substitua o # pelo seu link real -->
    <a href="#" class="btn">Minha Web Rádio</a>
    <a href="#" class="btn">YouTube</a>
    <a href="#" class="btn">Spotify</a>
    <a href="#" class="btn">Instagram</a>
    <a href="#" class="btn">WhatsApp</a>
</div>

</body>
</html>
