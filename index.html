<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tocha Viva Oficial | Portfólio</title>
    <style>
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            margin: 0; 
            padding: 20px;
            /* Aqui está o truque da imagem de fundo com filtro escuro */
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('SUA_IMAGEM.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #D4AF37; 
            text-align: center; 
        }
        .container { max-width: 450px; margin: 40px auto; padding: 20px; }
        h1 { color: #D4AF37; font-size: 32px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 3px; }
        p { color: #ffffff; font-size: 16px; margin-bottom: 40px; }
        
        .btn { display: block; width: 100%; padding: 15px; margin: 12px 0; background: transparent; color: #D4AF37; text-decoration: none; border: 2px solid #D4AF37; border-radius: 5px; font-weight: bold; transition: 0.3s; box-sizing: border-box; }
        .btn:hover { background: #D4AF37; color: #000000; cursor: pointer; }
        
        .btn-destaque { background: #D4AF37; color: #000000; border: 2px solid #D4AF37; }
        .btn-destaque:hover { background: #fff; border-color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h1>Tocha Viva Oficial</h1>
    <p>Compositora e Produtora | Studio Deus Extraordinário</p>

    <a href="#" class="btn btn-destaque">📚 Minha Biblioteca</a>
    <a href="#" class="btn">Web Rádio</a>
    <a href="#" class="btn">YouTube</a>
    <a href="#" class="btn">TikTok</a>
    <a href="#" class="btn">Facebook</a>
    <a href="#" class="btn">Instagram</a>
    <a href="#" class="btn">WhatsApp</a>
    <a href="#" class="btn">Apple Music</a>
    <a href="#" class="btn">Spotify</a>
    <a href="#" class="btn">Threads</a>
    <a href="#" class="btn">X (Twitter)</a>
</div>

</body>
</html>
